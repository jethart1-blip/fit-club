<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 320">
  <!-- Lower legs -->
  <rect x="76" y="249" width="18" height="58" rx="7" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <rect x="106" y="249" width="18" height="58" rx="7" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <!-- Upper legs (hamstrings) -->
  <rect x="74" y="187" width="22" height="60" rx="8" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <rect x="104" y="187" width="22" height="60" rx="8" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <!-- Glutes -->
  <ellipse cx="100" cy="170" rx="32" ry="17" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <!-- Torso lower (lower back) -->
  <rect x="72" y="108" width="56" height="52" rx="6" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <!-- Torso upper (upper back)  highlighted -->
  <rect x="68" y="55" width="64" height="54" rx="8" fill="#6366f1" stroke="#4f46e5" stroke-width="1.5"/>
  <!-- Spine line (back view indicator) -->
  <line x1="100" y1="57" x2="100" y2="108" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Forearms -->
  <rect x="44" y="118" width="14" height="50" rx="6" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <rect x="142" y="118" width="14" height="50" rx="6" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <!-- Upper arms -->
  <rect x="47" y="64" width="16" height="52" rx="7" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <rect x="137" y="64" width="16" height="52" rx="7" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <!-- Shoulder caps -->
  <ellipse cx="62" cy="63" rx="13" ry="10" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <ellipse cx="138" cy="63" rx="13" ry="10" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <!-- Neck -->
  <rect x="94" y="41" width="12" height="16" rx="4" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="100" cy="24" r="17" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5"/>
</svg>
